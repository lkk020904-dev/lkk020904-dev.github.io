<div id="game">
  <h2>하트 포인트 게임 🎮</h2>
  <p>하트를 누르면 포인트가 올라감!</p>

  <div class="heart" onclick="earnPoint()">💖</div>

  <p>포인트: <span id="point">0</span>P</p>

  <h3>쿠폰 상점 🎁</h3>

  <button onclick="buyCoupon('뽀뽀 쿠폰 😘', 10)">
    뽀뽀 쿠폰 😘 (10P)
  </button>

  <button onclick="buyCoupon('안마 쿠폰 💆', 30)">
    안마 쿠폰 💆 (30P)
  </button>

  <button onclick="buyCoupon('치킨 사주기 쿠폰 🍗', 100)">
    치킨 사주기 🍗 (100P)
  </button>

  <p id="couponMsg"></p>

  <h3>보유 쿠폰 🎫</h3>
  <ul id="inventory"></ul>
</div>

<script>
const messages = [
  "오늘도 사랑해 😘",
  "재홍이는 금규꺼 💘",
  "보고 싶다 이자식아 🫶",
  "밥 잘 챙겨 먹어라!",
  "금규가 제일 좋아함 ❤️"
];

function changeMsg() {
  const random = Math.floor(Math.random() * messages.length);
  document.getElementById("msg").innerText = messages[random];
}

function showGame() {
  document.getElementById("game").style.display = "block";
}

let point = 0;

function earnPoint() {
  point++;
  document.getElementById("point").innerText = point;
}

function buyCoupon(name, price) {
  if (point >= price) {
    point -= price;

    document.getElementById("point").innerText = point;

    document.getElementById("couponMsg").innerText =
      name + " 구매 완료! 💕";

    const li = document.createElement("li");
    li.innerText = name;
    document.getElementById("inventory").appendChild(li);

  } else {
    document.getElementById("couponMsg").innerText =
      "포인트 부족함 😤";
  }
}
</script>
