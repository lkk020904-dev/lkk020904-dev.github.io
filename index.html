<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>재홍 전용 페이지</title>

<meta property="og:title" content="재홍 전용 페이지 💕">
<meta property="og:description" content="재홍이만 들어와">
<meta property="og:image" content="https://lkk020904-dev.github.io/IMG_7485.jpeg">
<meta property="og:url" content="https://금규.com">
<meta property="og:type" content="website">

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #ffe1ec, #e8f0ff);
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}
.box {
  background: white;
  padding: 35px;
  border-radius: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  width: 85%;
  max-width: 420px;
}
h1 { color: #ff4f8b; }
p { font-size: 18px; }
button {
  margin: 8px;
  padding: 14px 22px;
  border: 0;
  border-radius: 999px;
  background: #ff4f8b;
  color: white;
  font-size: 16px;
}
#game {
  display: none;
  margin-top: 20px;
}
.heart {
  font-size: 60px;
  cursor: pointer;
}
</style>
</head>

<body>
<div class="box">
  <h1>재홍 전용 페이지 💖</h1>
  <p>여기는 금규가 만든 비밀 공간입니다.</p>

  <p id="msg">오늘도 사랑해 😘</p>
  <button onclick="changeMsg()">사랑 문구 보기</button>

  <button onclick="showGame()">게임하기 🎮</button>

  <div id="game">
    <h2>하트 누르기 게임</h2>
    <p>하트를 누르면 점수가 올라감!</p>
    <div class="heart" onclick="scoreUp()">💖</div>
    <p>점수: <span id="score">0</span></p>
  </div>
</div>

<script>
const messages = [
  "오늘도 사랑해 😘",
  "재홍이는 금규꺼 💘",
  "보고 싶다 이자식아 🫶",
  "밥 잘 챙겨 먹어라!",
  "금규가 제일 좋아함 ❤️"
];

function changeMsg() {
  const random = Math.floor(Math.random() * messages.length);
  document.getElementById("msg").innerText = messages[random];
}

function showGame() {
  document.getElementById("game").style.display = "block";
}

let score = 0;
function scoreUp() {
  score++;
  document.getElementById("score").innerText = score;
}
</script>
</body>
</html>
